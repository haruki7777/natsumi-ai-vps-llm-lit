name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade huggingface_hub

      - name: Upload files to Hugging Face Space
        env:
          HF_TOKEN: ${{secrets.HF_TOKEN}}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import upload_folder

          token = os.environ.get('HF_TOKEN')
          if not token:
              raise RuntimeError('HF_TOKEN secret is missing')

          upload_folder(
              repo_id='haruki7777/natsumi-ai-vps-llm-lit',
              repo_type='space',
              folder_path='.',
              token=token,
              ignore_patterns=[
                  '.git/*',
                  '.github/*',
                  'models/*.gguf',
                  'models/_hf_cache/*',
                  '__pycache__/*',
              ],
              commit_message='Sync from GitHub Actions'
          )
          PY
